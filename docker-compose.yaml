version: "3.9"

services:
  research-agent:
    build: ./agents/research-agent
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NIM_LEAD_MODEL=${NIM_LEAD_MODEL:-nvidia/llama-3.3-nemotron-super-49b-v1}
      - NIM_WORKER_MODEL=${NIM_WORKER_MODEL:-nvidia/nvidia-nemotron-nano-9b-v2}
      - CRW_URL=http://172.17.0.1:3002
    cpus: 2
    mem_limit: 2g
    read_only: true
    tmpfs:
      - /tmp
    user: "1000:1000"
    volumes:
      - ./data/research-agent:/data
    restart: unless-stopped

  agent-gateway:
    build: ./gateway
    ports:
      - "127.0.0.1:8092:8092"
    volumes:
      - ./gateway/agents.yaml:/app/agents.yaml:ro
    env_file:
      - ./gateway/.env
    restart: unless-stopped
